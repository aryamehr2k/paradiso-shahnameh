# ai-toolkit config — Persian-miniature (Shahnameh) Flux LoRA
# run:  python ai-toolkit/run.py train_flux_persian.yaml
---
job: extension
config:
  name: "flux_persian_miniature"
  process:
    - type: "sd_trainer"
      training_folder: "output"
      device: "cuda:0"
      performance_log_every: 50

      network:
        type: "lora"
        linear: 32              # rank; 16 is lighter, 32 holds ornate detail well
        linear_alpha: 32

      save:
        dtype: "float16"
        save_every: 500
        max_step_saves_to_keep: 4

      datasets:
        - folder_path: "dataset"        # built by 01_build_dataset.py
          caption_ext: "txt"
          caption_dropout_rate: 0.05    # sometimes drop caption -> stronger style prior
          cache_latents_to_disk: true
          resolution: [ 768, 1024 ]     # bucketed; manuscript folios are tall

      train:
        batch_size: 1
        steps: 2500                     # 2000-3000 is the sweet spot for a style LoRA
        gradient_accumulation_steps: 1
        train_unet: true
        train_text_encoder: false       # style lives in the transformer, not the text enc
        gradient_checkpointing: true
        noise_scheduler: "flowmatch"
        optimizer: "adamw"              # NOT adamw8bit — bitsandbytes is flaky on Blackwell
        lr: 1e-4
        dtype: "bf16"

      model:
        name_or_path: "black-forest-labs/FLUX.1-dev"
        is_flux: true
        quantize: true                  # GB10 has 128GB — set false for max quality if you like

      sample:
        sampler: "flowmatch"
        sample_every: 500               # peek at progress every 500 steps
        width: 768
        height: 1024
        guidance_scale: 4
        sample_steps: 20
        seed: 42
        walk_seed: true
        prompts:
          - "shahnameh persian miniature style. Two pilgrims at the edge of a river of golden light, sparks rising into flowering banks."
          - "shahnameh persian miniature style. A great rose of light, tiers of blessed souls in a circular court, angels among them."

# ---- SDXL fallback (more mature on Blackwell, lighter) ----
# Swap model -> stabilityai/stable-diffusion-xl-base-1.0 , is_flux: false ,
# noise_scheduler: ddpm , guidance ~7. See ai-toolkit/config/examples/ for the SDXL template.
