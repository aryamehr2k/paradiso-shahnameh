<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Paradiso XXX — the folio that paints itself</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0a0c1a;--ink2:#11142e;
    --lapis:#22357e;--lapis-deep:#172456;
    --turq:#2f8f86;--gold:#f2c25a;--gold-bright:#ffe39a;--gold-deep:#c8922f;
    --radiance:#fff7e2;--blush:#e2a3b0;--crimson:#b1303a;--ivory:#efe7d3;
    --persian:"Vazirmatn","Noto Naskh Arabic","Scheherazade New","Geeza Pro",Tahoma,serif;
    --body:Georgia,"Iowan Old Style","Times New Roman",serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:radial-gradient(120% 100% at 50% -10%, #1d2350 0%, var(--ink2) 46%, var(--ink) 100%) fixed;
    color:var(--ivory);font-family:var(--body);overflow:hidden;-webkit-font-smoothing:antialiased;
  }
  .dust{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.4;
    background-image:
      radial-gradient(1.5px 1.5px at 18% 24%, rgba(255,231,160,.7), transparent),
      radial-gradient(1.5px 1.5px at 78% 14%, rgba(255,231,160,.5), transparent),
      radial-gradient(1px 1px at 40% 66%, rgba(200,210,240,.5), transparent),
      radial-gradient(1.5px 1.5px at 88% 58%, rgba(255,231,160,.5), transparent),
      radial-gradient(1px 1px at 10% 80%, rgba(200,210,240,.5), transparent);}

  .wrap{position:relative;z-index:2;height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}

  /* the folio — a Safavid manuscript page in nested gold/lapis/turquoise rulings */
  .folio{
    position:relative;height:min(92vh,820px);aspect-ratio:400/560;max-width:96vw;
    border:2px solid var(--gold-deep);
    box-shadow:
      0 0 0 3px var(--lapis-deep), 0 0 0 5px var(--gold),
      0 0 0 7px var(--turq), 0 0 0 9px var(--gold-deep),
      0 26px 70px rgba(0,0,0,.6), 0 0 100px rgba(255,222,138,.12);
    cursor:pointer;user-select:none;background:#0c1230;overflow:hidden;border-radius:2px;
  }
  #mini{position:absolute;inset:0;width:100%;height:100%;display:block;}

  /* the only words: a Persian couplet, fading in like an inscription */
  .verse{position:absolute;left:0;right:0;bottom:30px;z-index:3;pointer-events:none;text-align:center;
    font-family:var(--persian);direction:rtl;color:var(--gold-bright);
    font-size:clamp(.95rem,2.6vw,1.35rem);line-height:2;
    text-shadow:0 0 18px rgba(0,0,0,.7),0 0 24px rgba(255,222,138,.25);
    opacity:0;transition:opacity 1.4s ease;padding:0 6%;}
  .verse.show{opacity:.96;}

  /* progress: four small gold marks */
  .beads{position:absolute;left:0;right:0;top:16px;z-index:3;pointer-events:none;
    display:flex;gap:9px;justify-content:center;}
  .bead{width:7px;height:7px;border-radius:50%;background:rgba(255,231,160,.22);
    box-shadow:0 0 0 1px rgba(200,146,47,.5);transition:background .5s ease,box-shadow .5s ease;}
  .bead.on{background:var(--gold-bright);box-shadow:0 0 12px rgba(255,222,138,.9);}

  /* a wordless cue to interact */
  .cue{position:absolute;left:0;right:0;bottom:64px;z-index:3;pointer-events:none;text-align:center;
    color:var(--gold-bright);opacity:.85;font-size:26px;transition:opacity .6s ease;}
  .cue.hide{opacity:0;}
  @keyframes bob{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(-7px);opacity:1}}
  .cue span{display:inline-block;animation:bob 1.8s ease-in-out infinite;}

  /* a barely-there caption, the title only */
  .caption{position:absolute;left:0;right:0;top:30px;z-index:3;pointer-events:none;text-align:center;
    text-transform:uppercase;letter-spacing:.36em;font-size:.62rem;color:var(--gold-bright);opacity:.65;}

  @media (prefers-reduced-motion: reduce){
    #mini *{animation:none !important;}
    .cue span{animation:none;}
  }
</style>
</head>
<body>
  <div class="dust"></div>
  <div class="wrap">
    <div class="folio" id="folio" role="application"
         aria-label="An interactive illuminated folio of Dante's Paradiso, Canto XXX. Tap, or press space, to let the vision unfold: a river of light, a ring, a rose, a point of light.">
      <svg id="mini" viewBox="0 0 400 560" aria-hidden="true"></svg>
      <div class="caption">Paradiso · XXX</div>
      <div class="beads" id="beads"></div>
      <div class="verse" id="verse"></div>
      <div class="cue" id="cue"><span>›</span></div>
    </div>
  </div>

<script>
"use strict";
(function(){
  var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var SVGNS='http://www.w3.org/2000/svg';
  var mini=document.getElementById('mini');
  var folio=document.getElementById('folio');
  var verseEl=document.getElementById('verse');
  var cueEl=document.getElementById('cue');
  var beadsEl=document.getElementById('beads');

  var CX=200, CY=250;
  function s(tag,attrs){var e=document.createElementNS(SVGNS,tag);for(var k in attrs){if(attrs.hasOwnProperty(k))e.setAttribute(k,attrs[k]);}return e;}
  function rnd(a,b){return a+Math.random()*(b-a);}

  /* the three couplets — the only words, in the Shahnameh metre */
  var VERSES=[
    '',
    'به جویی رسید از فروغ و ز نور<br>که موجش همه اختر و لعل و حور',
    '',
    'شد آن جوی گردان، گلی از فروغ<br>گلی کش نه برگ و نه بو، جز فروغ',
    'میانش یکی نقطه، تابان‌تر از مهر<br>فرشته به گردش، چو پروانه، سپهر'
  ];

  /* progress beads (4 beats after the blank page) */
  for(var i=0;i<4;i++){ beadsEl.appendChild(Object.assign(document.createElement('div'),{className:'bead'})); }
  var beads=beadsEl.children;

  var L={}; var sparks=[];

  function build(){
    while(mini.firstChild) mini.removeChild(mini.firstChild);
    sparks=[];

    var defs=s('defs',{});
    defs.innerHTML=
      '<radialGradient id="gGround" cx="50%" cy="42%" r="78%">'+
        '<stop offset="0%" stop-color="#1a2a66"/><stop offset="55%" stop-color="#101a44"/><stop offset="100%" stop-color="#0a1030"/>'+
      '</radialGradient>'+
      '<linearGradient id="gRiver" x1="0" y1="0" x2="0" y2="1">'+
        '<stop offset="0%" stop-color="#fff7e2"/><stop offset="50%" stop-color="#ffe39a"/><stop offset="100%" stop-color="#f2c25a"/>'+
      '</linearGradient>'+
      '<radialGradient id="gRose" cx="50%" cy="50%" r="50%">'+
        '<stop offset="0%" stop-color="#fff7e2"/><stop offset="38%" stop-color="#ffe39a"/><stop offset="72%" stop-color="#f2c25a"/><stop offset="100%" stop-color="#e2a3b0"/>'+
      '</radialGradient>'+
      '<radialGradient id="gPoint" cx="50%" cy="50%" r="50%">'+
        '<stop offset="0%" stop-color="#ffffff"/><stop offset="20%" stop-color="#fff7e2"/><stop offset="55%" stop-color="rgba(255,227,154,.5)"/><stop offset="100%" stop-color="rgba(255,227,154,0)"/>'+
      '</radialGradient>'+
      '<filter id="soft" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2.6"/></filter>';
    mini.appendChild(defs);

    // ground + gold flecks
    var g0=s('g',{});
    g0.appendChild(s('rect',{x:0,y:0,width:400,height:560,fill:'url(#gGround)'}));
    for(var f=0;f<54;f++){
      g0.appendChild(s('circle',{cx:rnd(8,392).toFixed(1),cy:rnd(8,552).toFixed(1),
        r:rnd(.5,1.7).toFixed(2),fill:'#ffe39a','fill-opacity':rnd(.1,.4).toFixed(2)}));
    }
    mini.appendChild(g0);

    // ---- layer: RIVER ----
    var river=layer();
    var riverD='M200,46 C150,108 250,168 200,234 S150,360 200,424 S250,512 200,546';
    river.appendChild(s('path',{d:riverD,fill:'none',stroke:'url(#gRiver)','stroke-width':30,'stroke-linecap':'round',opacity:.9,filter:'url(#soft)'}));
    river.appendChild(s('path',{d:riverD,fill:'none',stroke:'#fff7e2','stroke-width':9,'stroke-linecap':'round',opacity:.95}));
    var bankCols=['#e2a3b0','#56c8bb','#9aa0e6','#ffe39a'];
    for(var b=0;b<9;b++){
      bloom(river, rnd(42,96), 80+b*52+rnd(-8,8), bankCols[b%4]);
      bloom(river, rnd(304,358), 80+b*52+rnd(-8,8), bankCols[(b+2)%4]);
    }
    mini.appendChild(river); L.river=river;

    // ---- layer: RING ----
    var ring=layer();
    ring.appendChild(s('circle',{cx:CX,cy:CY,r:120,fill:'none',stroke:'url(#gRiver)','stroke-width':26,opacity:.85,filter:'url(#soft)'}));
    ring.appendChild(s('circle',{cx:CX,cy:CY,r:120,fill:'none',stroke:'#fff7e2','stroke-width':7,opacity:.95}));
    mini.appendChild(ring); L.ring=ring;

    // ---- layer: ROSE ----
    var rose=layer();
    var tiers=[{r:38,n:8,o:.95},{r:70,n:13,o:.85},{r:102,n:18,o:.72},{r:134,n:24,o:.56}];
    for(var t=tiers.length-1;t>=0;t--){
      var T=tiers[t],tg=s('g',{});
      for(var p=0;p<T.n;p++){
        tg.appendChild(s('ellipse',{cx:CX,cy:CY-T.r,rx:(T.r*0.30).toFixed(1),ry:(T.r*0.5).toFixed(1),
          fill:'url(#gRose)','fill-opacity':T.o,stroke:'#c8922f','stroke-width':.4,
          transform:'rotate('+((360/T.n)*p).toFixed(1)+' '+CX+' '+CY+')'}));
      }
      if(!reduced){ tg.appendChild(rot(CX,CY, t%2?70:-58)); }
      rose.appendChild(tg);
    }
    rose.appendChild(s('circle',{cx:CX,cy:CY,r:20,fill:'url(#gPoint)'}));
    mini.appendChild(rose); L.rose=rose;

    // ---- layer: POINT ----
    var point=layer();
    point.appendChild(s('circle',{cx:CX,cy:CY,r:140,fill:'url(#gPoint)','fill-opacity':.9}));
    var rays=s('g',{});
    for(var ry=0;ry<24;ry++){
      rays.appendChild(s('line',{x1:CX,y1:CY,x2:CX,y2:CY-170,stroke:'#fff7e2','stroke-width':.8,'stroke-opacity':.5,
        transform:'rotate('+(ry*15)+' '+CX+' '+CY+')'}));
    }
    if(!reduced) rays.appendChild(rot(CX,CY,46));
    point.appendChild(rays);
    var angels=s('g',{});
    for(var an=0;an<11;an++){
      var aa=(360/11)*an, rr=60+(an%2?16:0);
      var ax=CX+rr*Math.cos(aa*Math.PI/180), ay=CY+rr*Math.sin(aa*Math.PI/180);
      angels.appendChild(s('path',{d:'M0,0 q-5,-3 -8,1 q5,1 8,3 q3,-2 8,3 q-3,-4 -8,-1 z',
        transform:'translate('+ax.toFixed(1)+' '+ay.toFixed(1)+')',fill:'#fff7e2','fill-opacity':.9}));
    }
    if(!reduced) angels.appendChild(rot(CX,CY,10));
    point.appendChild(angels);
    var core=s('circle',{cx:CX,cy:CY,r:7,fill:'#fff'});
    if(!reduced){var an2=s('animate',{attributeName:'r',values:'6;9.5;6',dur:'2.4s',repeatCount:'indefinite'});core.appendChild(an2);}
    point.appendChild(core);
    mini.appendChild(point); L.point=point;

    // ---- the two figures, always present ----
    var fig=s('g',{});
    figure(fig,150,540,'#22357e','#ffe39a');   // Beatrice
    figure(fig,250,540,'#b1303a','#3a2e18');    // Dante (the pilgrim)
    mini.appendChild(fig); L.figures=fig;

    // ---- living sparks that follow the cursor (the rubies of the river) ----
    var gsp=s('g',{});
    for(var sp=0;sp<40;sp++){
      var bx=rnd(60,340), by=rnd(60,520);
      var el=s('circle',{cx:bx.toFixed(1),cy:by.toFixed(1),r:rnd(1.4,3).toFixed(2),
        fill:(sp%3?'#b1303a':'#ffe39a'),'fill-opacity':rnd(.5,.95).toFixed(2)});
      gsp.appendChild(el);
      sparks.push({el:el,bx:bx,by:by,x:bx,y:by,ph:rnd(0,6.28),sp:rnd(.4,1)});
    }
    mini.appendChild(gsp); L.sparks=gsp;
  }

  function layer(){var g=s('g',{}); g.style.opacity='0'; g.style.transition='opacity 1.25s ease'; return g;}
  function rot(cx,cy,dur){return s('animateTransform',{attributeName:'transform',type:'rotate',
      from:'0 '+cx+' '+cy,to:(dur<0?'-360 ':'360 ')+cx+' '+cy,dur:Math.abs(dur)+'s',repeatCount:'indefinite'});}
  function bloom(parent,cx,cy,col){
    var g=s('g',{});
    for(var a=0;a<6;a++){g.appendChild(s('ellipse',{cx:cx,cy:cy,rx:3.4,ry:1.4,fill:col,'fill-opacity':.85,
      transform:'rotate('+(a*60)+' '+cx+' '+cy+')'}));}
    g.appendChild(s('circle',{cx:cx,cy:cy,r:1.5,fill:'#fff7e2'}));
    parent.appendChild(g);
  }
  function figure(parent,x,base,robe,cap){
    var g=s('g',{});
    g.appendChild(s('path',{d:'M'+(x-12)+','+base+' Q'+x+','+(base-46)+' '+(x+12)+','+base+' Z',fill:robe,stroke:'#0a0c1a','stroke-width':.6}));
    g.appendChild(s('circle',{cx:x,cy:base-52,r:9,fill:'none',stroke:'#ffe39a','stroke-width':2,'stroke-opacity':.85}));
    g.appendChild(s('circle',{cx:x,cy:base-52,r:6,fill:'#efe7d3'}));
    g.appendChild(s('path',{d:'M'+(x-6)+','+(base-54)+' Q'+x+','+(base-62)+' '+(x+6)+','+(base-54)+' Z',fill:cap}));
    parent.appendChild(g);
  }

  /* reveal beats cumulatively: river -> ring -> rose -> point */
  function show(stage){
    if(!L.river) return;
    var set=function(g,on){ g.style.opacity = on?'1':'0'; };
    // the vision transforms: each beat replaces the last form, the rose stays beneath the point
    set(L.river, stage===1);
    set(L.ring,  stage===2);
    set(L.rose,  stage>=3);
    set(L.point, stage>=4);
    for(var i=0;i<4;i++){ beads[i].classList.toggle('on', stage>=i+1); }
    verseEl.classList.remove('show');
    var v=VERSES[stage]||'';
    if(v){ verseEl.innerHTML=v; setTimeout(function(){verseEl.classList.add('show');}, 220); }
    else { verseEl.innerHTML=''; }
  }

  /* ---- interaction: tap / space / arrow advances the vision ---- */
  var stage=0, MAX=4;
  function advance(){
    if(stage>=MAX){ stage=0; build(); show(0); cueEl.classList.remove('hide'); return; }
    stage++;
    show(stage);
    // the cue hides once the vision is complete; otherwise it keeps inviting the next beat
    cueEl.classList.toggle('hide', stage>=MAX);
  }
  folio.addEventListener('click',advance);
  window.addEventListener('keydown',function(e){
    if(e.key===' '||e.key==='Enter'||e.key==='ArrowRight'||e.key==='ArrowUp'){e.preventDefault();advance();}
    else if(e.key==='ArrowLeft'){ if(stage>0){stage--;show(stage);cueEl.classList.remove('hide');} }
  });

  /* ---- pointer-reactive sparks ---- */
  var pointer={x:-999,y:-999,on:false};
  function toVB(clientX,clientY){
    var r=mini.getBoundingClientRect();
    return {x:(clientX-r.left)/r.width*400, y:(clientY-r.top)/r.height*560};
  }
  folio.addEventListener('pointermove',function(e){var p=toVB(e.clientX,e.clientY);pointer.x=p.x;pointer.y=p.y;pointer.on=true;});
  folio.addEventListener('pointerleave',function(){pointer.on=false;});

  var tPrev=0;
  function tick(ts){
    var dt=(ts-tPrev)||16; tPrev=ts;
    for(var i=0;i<sparks.length;i++){
      var sk=sparks[i];
      var tx=sk.bx, ty=sk.by;
      // gentle ambient drift
      sk.ph+=0.02*sk.sp;
      tx+=Math.cos(sk.ph)*7; ty+=Math.sin(sk.ph*1.3)*7;
      // attraction to the cursor
      if(pointer.on){
        var dx=pointer.x-sk.x, dy=pointer.y-sk.y, d=Math.sqrt(dx*dx+dy*dy)+0.001;
        if(d<150){ var pull=(150-d)/150*0.5; tx=sk.x+dx*pull; ty=sk.y+dy*pull; }
      }
      sk.x+=(tx-sk.x)*0.06; sk.y+=(ty-sk.y)*0.06;
      sk.el.setAttribute('cx',sk.x.toFixed(1));
      sk.el.setAttribute('cy',sk.y.toFixed(1));
      sk.el.setAttribute('fill-opacity',(0.55+0.4*Math.abs(Math.sin(sk.ph))).toFixed(2));
    }
    requestAnimationFrame(tick);
  }

  build(); show(0);
  if(!reduced) requestAnimationFrame(tick);
})();
</script>
</body>
</html>
